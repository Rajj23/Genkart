apiVersion: apps/v1
kind: Deployment
metadata:
  name: genkart-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: genkart-server
  template:
    metadata:
      labels:
        app: genkart-server
    spec:
      containers:
        - name: server
          image: rajjaiswal23/gen-serv:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5560
          envFrom:
            - secretRef:
                name: genkart-server-secrets
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5560
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5560
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: genkart-server
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "5560"
spec:
  selector:
    app: genkart-server
  type: NodePort
  ports:
    - protocol: TCP
      port: 5560
      targetPort: 5560
      nodePort: 30056