apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: genkart-ingress
  annotations:
    # CORS – allow browser calls from the minikube NodePort URLs
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type,Authorization,X-Requested-With,Accept,Origin"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-max-age: "1728000"

    # Proxy settings for cookies
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"

    # Regex routing – /api/* goes to server, everything else to client
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: "/$2"

spec:
  ingressClassName: nginx
  rules:
    - host: genkart.local
      http:
        paths:
          # /api/* → server (strips /api prefix via rewrite-target /$2)
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: genkart-server
                port:
                  number: 5560
          # /* → client
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: genkart-client
                port:
                  number: 3005
